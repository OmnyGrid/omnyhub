name: omnyhub
description: >-
  A reusable, protocol-agnostic HUB framework in pure Dart. Host multiple
  services on one port, route by host/path/header/protocol/auth, act as a
  reverse proxy over HTTP/HTTPS/WS/WSS with automatic Let's Encrypt TLS, and
  build distributed HUB/Node infrastructures.
version: 1.0.0
repository: https://github.com/OmnyGrid/omnyhub

environment:
  sdk: ^3.10.9

dependencies:
  http: ^1.6.0
  meta: ^1.16.0
  multi_domain_secure_server: ^1.0.16
  path: ^1.9.1
  shelf: ^1.4.2
  shelf_letsencrypt: ^2.0.3
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  dependency_validator: ^5.0.5
  lints: ^6.1.0
  shelf_router: ^1.1.4
  test: ^1.31.1

executables:
  omnyhub: omnyhub

# The committed self-signed certificate used only by the test suite (see
# test/support/certs/README.md); not a real secret.
false_secrets:
  - /test/support/certs/localhost.key
